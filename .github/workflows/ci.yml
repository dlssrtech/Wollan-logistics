name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/api, apps/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package.json
      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install
      - name: Test
        working-directory: ${{ matrix.app }}
        run: npm run test --if-present
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
  docker:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build API image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/homesphere-api:${{ github.sha }} apps/api
      - name: Build Web image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/homesphere-web:${{ github.sha }} apps/web
      - name: Push API image
        run: docker push ghcr.io/${{ github.repository_owner }}/homesphere-api:${{ github.sha }}
      - name: Push Web image
        run: docker push ghcr.io/${{ github.repository_owner }}/homesphere-web:${{ github.sha }}
