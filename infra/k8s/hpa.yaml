apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: homesphere-api-hpa
  namespace: homesphere
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homesphere-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: homesphere-web-hpa
  namespace: homesphere
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homesphere-web
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
